<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="100%" stop-color="#0F0D1A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="bar-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="40%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Ambient glow -->
  <circle cx="200" cy="150" r="300" fill="#6366F1" opacity="0.06"/>
  <circle cx="900" cy="500" r="250" fill="#14B8A6" opacity="0.05"/>
  <!-- Waveform icon -->
  <g transform="translate(600,220)">
    <rect x="-80" y="-12" width="10" height="24" rx="5" fill="url(#bar-g)" opacity=".4"/>
    <rect x="-60" y="-28" width="10" height="56" rx="5" fill="url(#bar-g)" opacity=".6"/>
    <rect x="-40" y="-45" width="12" height="90" rx="6" fill="url(#bar-g)" opacity=".8"/>
    <rect x="-18" y="-55" width="12" height="110" rx="6" fill="url(#bar-g)" opacity=".9"/>
    <rect x="4" y="-40" width="12" height="80" rx="6" fill="url(#bar-g)"/>
    <rect x="26" y="-50" width="14" height="100" rx="7" fill="#818CF8"/>
    <rect x="50" y="-35" width="12" height="70" rx="6" fill="url(#bar-g)" opacity=".85"/>
    <rect x="72" y="-22" width="10" height="44" rx="5" fill="url(#bar-g)" opacity=".6"/>
    <circle cx="90" cy="0" r="5" fill="#14B8A6" opacity=".8"/>
  </g>
  <!-- Text -->
  <text x="600" y="360" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="72" font-weight="800" fill="url(#accent)">Verby</text>
  <text x="600" y="420" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="500" fill="#94A3B8">AI Voice-to-Text for Mac &amp; Windows</text>
  <text x="600" y="470" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#475569">Talk to any app. Verby handles the rest.</text>
  <!-- Bottom bar -->
  <rect x="0" y="610" width="1200" height="20" fill="url(#accent)" opacity="0.6"/>
</svg>
