<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <defs>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="wave-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="40%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>
  <!-- Waveform icon -->
  <g transform="translate(40,40)">
    <rect x="-22" y="-5" width="4" height="10" rx="2" fill="url(#wave-grad)" opacity=".4"/>
    <rect x="-15" y="-10" width="4" height="20" rx="2" fill="url(#wave-grad)" opacity=".55"/>
    <rect x="-8" y="-16" width="5" height="32" rx="2.5" fill="url(#wave-grad)" opacity=".75"/>
    <rect x="0" y="-22" width="5" height="44" rx="2.5" fill="url(#wave-grad)" opacity=".9"/>
    <rect x="8" y="-14" width="5" height="28" rx="2.5" fill="url(#wave-grad)" opacity=".8"/>
    <rect x="16" y="-8" width="4" height="16" rx="2" fill="url(#wave-grad)" opacity=".7"/>
    <circle cx="23" cy="0" r="2" fill="#14B8A6" opacity=".65"/>
  </g>
  <!-- Verby text with gradient -->
  <text x="75" y="50" font-family="'Outfit', 'SF Pro Display', 'Helvetica Neue', sans-serif" font-weight="700" font-size="36" fill="url(#text-grad)" letter-spacing="-0.02em">Verby</text>
</svg>
