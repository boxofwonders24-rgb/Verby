<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Main gradient: indigo → violet → teal -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <!-- Subtle inner glow -->
    <radialGradient id="glow" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="rgba(139,92,246,0.3)"/>
      <stop offset="100%" stop-color="rgba(99,102,241,0)"/>
    </radialGradient>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0F1A"/>
      <stop offset="100%" stop-color="#050508"/>
    </linearGradient>
    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#6366F1" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" ry="112" fill="url(#glow)"/>
  <!-- Subtle border -->
  <rect x="1" y="1" width="510" height="510" rx="111" ry="111" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

  <!-- Soundwave morphing into text cursor — the core concept -->
  <g transform="translate(256, 256)" filter="url(#shadow)">
    <!-- Left soundwave bars (voice input) -->
    <rect x="-120" y="-18" width="8" height="36" rx="4" fill="url(#g1)" opacity="0.5"/>
    <rect x="-100" y="-35" width="8" height="70" rx="4" fill="url(#g1)" opacity="0.65"/>
    <rect x="-80" y="-52" width="8" height="104" rx="4" fill="url(#g1)" opacity="0.8"/>
    <rect x="-60" y="-70" width="8" height="140" rx="4" fill="url(#g1)" opacity="0.9"/>
    <rect x="-40" y="-55" width="8" height="110" rx="4" fill="url(#g1)"/>

    <!-- Center: tall bar that IS the text cursor -->
    <rect x="-5" y="-85" width="10" height="170" rx="5" fill="url(#g1)">
      <!-- Subtle pulse animation hint via slight rounding -->
    </rect>

    <!-- Right soundwave bars (mirrored, fading = transformation) -->
    <rect x="32" y="-55" width="8" height="110" rx="4" fill="url(#g1)"/>
    <rect x="52" y="-70" width="8" height="140" rx="4" fill="url(#g1)" opacity="0.9"/>
    <rect x="72" y="-52" width="8" height="104" rx="4" fill="url(#g1)" opacity="0.8"/>
    <rect x="92" y="-35" width="8" height="70" rx="4" fill="url(#g1)" opacity="0.65"/>
    <rect x="112" y="-18" width="8" height="36" rx="4" fill="url(#g1)" opacity="0.5"/>
  </g>

  <!-- "V" lettermark subtly embedded in the wave pattern -->
  <!-- The negative space between the tallest bars forms a V shape -->
</svg>
