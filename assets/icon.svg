<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="40%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18183A"/>
      <stop offset="100%" stop-color="#0A0A1A"/>
    </linearGradient>
    <radialGradient id="glow" cx="42%" cy="45%" r="50%">
      <stop offset="0%" stop-color="rgba(99,102,241,0.12)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <!-- macOS icon mask — standard superellipse -->
    <clipPath id="icon-mask">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Everything clipped to macOS icon shape — no box artifacts -->
  <g clip-path="url(#icon-mask)">
    <!-- Background fills the clipped area -->
    <rect width="512" height="512" fill="url(#bg)"/>
    <rect width="512" height="512" fill="url(#glow)"/>

    <!-- Soundwave mark — wider bars, centered -->
    <g transform="translate(236, 256)">
      <!-- Left: voice wave -->
      <rect x="-168" y="-18" width="18" height="36" rx="9" fill="url(#g1)" opacity="0.4"/>
      <rect x="-136" y="-38" width="18" height="76" rx="9" fill="url(#g1)" opacity="0.55"/>
      <rect x="-104" y="-64" width="20" height="128" rx="10" fill="url(#g1)" opacity="0.75"/>
      <rect x="-70" y="-84" width="20" height="168" rx="10" fill="url(#g1)" opacity="0.9"/>
      <rect x="-36" y="-64" width="20" height="128" rx="10" fill="url(#g1)" opacity="0.95"/>

      <!-- Center: cursor -->
      <rect x="0" y="-100" width="24" height="200" rx="12" fill="url(#g2)"/>

      <!-- Right: text output -->
      <rect x="36" y="-54" width="20" height="108" rx="10" fill="url(#g1)" opacity="0.9"/>
      <rect x="70" y="-38" width="20" height="76" rx="10" fill="url(#g1)" opacity="0.7"/>
      <rect x="104" y="-26" width="18" height="52" rx="9" fill="url(#g1)" opacity="0.5"/>
      <rect x="136" y="-16" width="18" height="32" rx="9" fill="url(#g1)" opacity="0.35"/>

      <!-- Teal dot -->
      <circle cx="164" cy="3" r="8" fill="#14B8A6" opacity="0.65"/>
    </g>
  </g>

  <!-- No border — seamless icon -->
</svg>
